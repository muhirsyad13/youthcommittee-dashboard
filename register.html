<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - YouthCommittee</title>

    <link rel="stylesheet" href="css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="notificationContainer"></div>

    <div class="container page-enter">

        <div class="left-side">
            <img src="assets/Logo.png" class="logo">
            <h1>YouthCommittee</h1>
            <p>Dashboard Karang Taruna Digital</p>
        </div>

        <div class="right-side">

            <div class="register-card">
                <h2>Register</h2>
                <p>Buat akun baru</p>

                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <input type="password" id="confirmPassword" placeholder="Konfirmasi Password">

                <div class="captcha-box">
                    <div id="captchaText"></div>
                    <button onclick="generateCaptcha()">↻</button>
                </div>

                <input type="text" id="captchaInput" placeholder="Masukkan Captcha">

                <button class="register-btn" onclick="registerUser()">
                    Daftar
                </button>

                <div class="back-login">
                    Sudah punya akun?
                    <a href="login.html">Login</a>
                </div>
            </div>

        </div>

    </div>

    <script src="js/notification.js"></script>
    <script src="js/captcha.js"></script>
    <script src="js/register.js"></script>

</body>

</html>
